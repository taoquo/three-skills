interface:
  display_name: "Three.js Shader Port"
  short_description: "Translate Shadertoy/GLSL/WGSL shader logic into current Three.js TSL-first paths with explicit blockers, fallback rules, and verification notes."
  default_prompt: "Use $shader-port (Three.js Shader Port) when tasked with porting standalone shader logic into Three.js. Start by classifying the source contract: passes, resources, coordinates, and backend assumptions. Prefer a pure TSL route in the current Three.js 0.180.0 stack, using direct TSL primitives first and only using scoped glslFn/wgslFn interop when necessary. Be explicit about official constraints: Transpiler is GLSL-to-TSL only, ShaderMaterial/RawShaderMaterial/onBeforeCompile are not supported in WebGPURenderer, and raw WebGL fallbacks are separate WebGLRenderer routes. If the shader cannot be ported cleanly, say so plainly, give the narrowest viable fallback, and deliver verification notes that distinguish documented facts from reasoned inference."
