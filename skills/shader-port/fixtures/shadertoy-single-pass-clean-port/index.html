<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Shader Port: Shadertoy Single-Pass Clean Port</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "IBM Plex Sans", "Helvetica Neue", sans-serif;
        background:
          radial-gradient(circle at top, #1a2633 0%, #0b1017 42%, #05070b 100%);
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #05070b;
      }

      #app {
        width: 100%;
        height: 100%;
        display: block;
      }

      .legend,
      .status {
        position: fixed;
        z-index: 10;
        max-width: min(640px, calc(100vw - 32px));
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 16px;
        background: rgba(5, 7, 11, 0.8);
        backdrop-filter: blur(18px);
        color: rgba(255, 255, 255, 0.9);
      }

      .legend {
        left: 16px;
        top: 16px;
        padding: 14px 16px;
      }

      .legend h1 {
        margin: 0 0 8px;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .legend p {
        margin: 0 0 10px;
        font-size: 12px;
        line-height: 1.5;
        color: rgba(255, 255, 255, 0.74);
      }

      .legend strong {
        color: rgba(255, 255, 255, 0.92);
      }

      .legend code {
        font-family: "IBM Plex Mono", "SFMono-Regular", monospace;
        font-size: 11px;
      }

      .status {
        right: 16px;
        bottom: 16px;
        display: none;
        padding: 12px 14px;
        font-size: 12px;
        line-height: 1.5;
      }

      @media (max-width: 760px) {
        .legend {
          left: 12px;
          top: 12px;
          right: 12px;
          max-width: calc(100vw - 24px);
        }

        .status {
          right: 12px;
          left: 12px;
          bottom: 12px;
          max-width: calc(100vw - 24px);
        }
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.webgpu.js",
          "three/webgpu": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.webgpu.js",
          "three/tsl": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.tsl.js"
        }
      }
    </script>
  </head>
  <body>
    <canvas id="app"></canvas>
    <aside class="legend">
      <h1>Shader Port Fixture</h1>
      <p>
        Minimal runnable <strong>`pure-tsl`</strong> archetype for a synthetic
        Shadertoy-style single-pass fragment port.
      </p>
      <p>
        Requested route:
        <strong id="route-tag">auto</strong>
      </p>
      <p>
        Use <code>?backend=webgl2</code> to force the `WebGL2` backend under
        the same TSL graph.
      </p>
    </aside>
    <div class="status" id="status">Initializing shader-port fixture...</div>
    <script>
      const status = document.getElementById("status");

      if (window.location.protocol === "file:") {
        status.style.display = "block";
        status.style.borderColor = "rgba(248, 113, 113, 0.35)";
        status.textContent =
          "Zero-build fixtures must be previewed over http://localhost/..., not file://. Run a local HTTP server from the repo root and reopen this path over localhost.";
      } else {
        const moduleScript = document.createElement("script");
        moduleScript.type = "module";
        moduleScript.src = "./main.js";
        document.body.appendChild(moduleScript);
      }
    </script>
  </body>
</html>
