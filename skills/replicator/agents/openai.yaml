interface:
  display_name: "Three.js Replicator"
  short_description: "Recreate Three.js effects from multimodal references with evidence gates, structured routing, and fidelity review"
  default_prompt: "Use $replicator (Three.js Replicator) to orchestrate a reference-driven Three.js remake from multimodal inputs such as URLs, keywords, image URIs, screenshots, or local images. Enforce the reference access gate before any faithful remake, classify the mode contract explicitly, build a visual evidence table, route the dominant archetype, keep cross-source decisions explicit, escalate to specialist skills when the main uncertainty is material, shader, or performance specific, and finish with localhost browser validation plus task-appropriate review artifacts and fidelity notes in REPORT.md."
