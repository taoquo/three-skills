interface:
  display_name: "Three.js Material Lab"
  short_description: "Prototype Three.js materials, lighting, and surface finishes without a full effect replication workflow."
  default_prompt: "Use $material-lab (Three.js Material Lab) when the task is to analyze or craft a specific material, lighting rig, or surface treatment. First classify the material family and the key appearance drivers, including whether the task is standard PBR, measured or scanned material work, or SSS/translucency work. Then choose the smallest honest route in the current three.js ecosystem: stock `MeshStandardMaterial` or `MeshPhysicalMaterial`, `MeshSSSNodeMaterial` or addon translucency routes when subsurface cues are essential, NodeMaterial or TSL, imported `glTF` or `MaterialX`, ecosystem wrappers, or raw fallback only if necessary. Keep lighting and HDRI assumptions explicit, separate base material correctness from post polish, separate thin transmission from true SSS, run physics sanity checks for roughness, fresnel, metalness, transmission, thickness, and scan-input fidelity, and deliver a browser-validated prototype plus a short report that records what is physically grounded versus art-directed."
