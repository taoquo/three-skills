interface:
  display_name: "Three.js Performance Doctor"
  short_description: "Diagnose draw call, shader, and post stack bottlenecks, then recommend targeted optimizations or graceful degradation tiers."
  default_prompt: "Use $perf-doctor (Three.js Performance Doctor) only when the task is a Three.js performance question. First identify the runtime surface: `WebGLRenderer` or `WebGPURenderer`, actual backend when known, vanilla Three.js or `@react-three/fiber`, and the post stack such as `EffectComposer`, `postprocessing`, or `RenderPipeline`. Then collect device class, scene scale, interaction and raycast shape, and symptom description; gather metrics such as `renderer.info`, pass-local timings, upload or compile stalls, and CPU flame data; classify the dominant and secondary bottlenecks; and return the final diagnosis using the fixed section order from `assets/report-template.md`, with prioritized action items, instrumentation used, unknowns, and a degradation ladder that explains how to trade quality for budget."
