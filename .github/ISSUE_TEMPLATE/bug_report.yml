name: Bug report
description: Report a broken workflow, example, validation path, or packaging issue.
title: "bug: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction
      description: Exact steps, commands, or inputs to reproduce the issue.
      placeholder: |
        1. Run ...
        2. Open ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser, Python version, and any host tool involved.
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste errors, console output, or screenshots if relevant.
