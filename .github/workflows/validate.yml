name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate skill structure
        run: python3 scripts/validate_skills.py
      - name: Smoke test replicator scaffolder
        run: python3 scripts/smoke_test_replicator.py
      - name: Validate public examples
        run: python3 scripts/validate_replicator_fixtures.py
      - name: Validate shader-port fixtures
        run: python3 scripts/validate_shader_port_fixtures.py
      - name: Validate perf-doctor fixtures
        run: python3 scripts/validate_perf_doctor_fixtures.py
